<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Livros para MARC</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
        background: #f4f6f9;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .container {
        background: white;
        width: 100%;
        max-width: 500px;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }

    h2 {
        color: #1f2937;
        margin-bottom: 10px;
        font-size: 1.8rem;
    }

    .subtitle {
        color: #6b7280;
        margin-bottom: 25px;
        font-size: 0.95rem;
    }

    label {
        display: block;
        margin-bottom: 8px;
        color: #374151;
        font-weight: 600;
    }

    input {
        width: 100%;
        padding: 14px;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        font-size: 1rem;
        transition: 0.2s;
        margin-bottom: 20px;
    }

    input:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }

    button {
        width: 100%;
        background: #2563eb;
        color: white;
        border: none;
        padding: 14px;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #1d4ed8;
    }

    button:active {
        transform: scale(0.98);
    }

    .footer {
        margin-top: 20px;
        text-align: center;
        color: #9ca3af;
        font-size: 0.85rem;
    }
</style>
</head>

<body>

<div class="container">

    <h2>📚 Google Livros → MARC</h2>

    <p class="subtitle">
        Informe o identificador do livro no Google Livros para gerar um registro MARC.<br>
		Consule em <a href="https://books.google.com.br/" target="_new">https://books.google.com.br</a>
    </p>

    <label for="bookid">ID do Google Livros / ISBN</label>

    <input
        id="bookid"
        placeholder="Ex.: zyTCAlFPjgYC"
        autocomplete="off">

    <button onclick="importBook()">
        Gerar Registro MARC
    </button>

    <div class="footer">
        Conversão automática para importar no FOLIO
    </div>

</div>

<script>
function importBook() {

    let id = document.getElementById("bookid").value.trim();

    if (!id) {
        alert("Informe o ID do Google Livros ou ISBN.");
        return;
    }

    window.open(
        "http://localhost:5000/import/" +
        encodeURIComponent(id),
        "_blank"
    );
}
</script>

</body>
</html>
